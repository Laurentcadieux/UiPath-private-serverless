version: 1
orchestrator:
  url: "https://orchestrator.example.com"
  organization: "ExampleOrganization"
  tenant: "DefaultTenant"
  folder: "Production"
  environment: "Production"
  authentication:
    type: "machine_key"
    machine_key_env: "UIPATH_MACHINE_KEY"
runtime:
  count: 10
  container_prefix: "uipath-robot"
  image: "uipathprod.azurecr.io/robot/uiautomation-runtime:latest24.10"
  restart_policy: "unless-stopped"
  max_count: 100
  resources:
    memory: null
    cpus: null
docker:
  network_name: "uipath-runtime-network"
  dns:
    - "8.8.8.8"
    - "1.1.1.1"
packages:
  cache_path: "/var/lib/uipath-runtime/packages"
  nuget_config_path: "/var/lib/uipath-runtime/nuget/NuGet.Config"
  container_cache_path: "/application/Packages"
  container_nuget_config_path: "/home/robotuser/.nuget/NuGet/NuGet.Config"
  official_feed:
    enabled: true
    name: "UiPath-Official"
    url: "https://pkgs.dev.azure.com/uipath/Public.Feeds/_packaging/UiPath-Official/nuget/v3/index.json"
tls:
  ca_certificate: null
  install_on_host: true
  derived_image_prefix: "local/uipath-runtime"
logs:
  host_path: "/var/log/uipath-runtime"
  retain_days: 30
health:
  startup_timeout_seconds: 120
  connection_timeout_seconds: 30
  restart_loop_threshold: 3
scaling:
  minimum_count: 1
  burst_max_count: 5
  idle_minutes_before_stop: 30
  poll_interval_seconds: 60
  state_path: "/var/lib/uipath-runtime/scaling-state.json"
  active_job_probe:
    command:
      - "/bin/sh"
      - "-lc"
      - "pgrep -af 'UiPath.Executor|UiRobot|UiPath.Robot.Executor' >/dev/null"
autoscaling:
  enabled: false
  provider: "digitalocean"
  min_vms: 1
  max_vms: 3
  scale_up_active_ratio: 0.8
  scale_down_active_ratio: 0.1
  scale_down_idle_minutes: 30
  protected_vm_names: []
  digitalocean:
    token_env: "DIGITALOCEAN_TOKEN"
    region: "nyc1"
    size: "s-2vcpu-2gb"
    image: "ubuntu-24-04-x64"
    ssh_keys: []
    tags:
      - "uipath-runtime"
    name_prefix: "uipath-runtime-worker"
    user_data_path: null
